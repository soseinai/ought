[project]
name = "ought"
version = "0.1.0"

[specs]
roots = ["ought/"]

[context]
search_paths = ["src/"]
exclude = ["target/", "ought/ought-gen/"]

[generator]
provider = "anthropic"
model = "claude-sonnet-4-6"

# Runners are CliRunners configured via `ought.toml`.
#
# The simplest form: name the section after a built-in preset
# (rust | python | typescript | go) and ought fills in command, format,
# and file extensions for you. Users only need to pin `test_dir`.
#
# To use a different tool, set `command`, `format`, and `file_extensions`
# directly — see docs/design.md for the full schema.
[runner.rust]
test_dir = "ought/ought-gen/"
