name: Release

# This workflow has two trigger paths that together form one logical "release"
# operation:
#
#   1. workflow_dispatch (manual)  → bump-and-tag runs only
#      You click Actions → Release → Run workflow → enter version → Run.
#      bump-and-tag bumps Cargo.toml, commits as the bot, tags vX.Y.Z, and
#      pushes both. Pushing the tag then triggers path 2 below.
#
#   2. push tags ["v*"]  → build, github-release, publish-crates, bump-homebrew
#      Either fired by bump-and-tag's tag push, or by `git tag && git push`
#      from a laptop. Builds binaries, creates a GitHub release, publishes to
#      crates.io, and bumps the Homebrew formula.
#
# Each release results in TWO workflow runs in the Actions tab — one
# (workflow_dispatch) for the bump+tag, and one (push) for everything else.
# The run-name below labels them "1/2" and "2/2" so the sequence is obvious.

run-name: ${{ github.event_name == 'workflow_dispatch' && format('Release v{0} · 1/2 (bump + tag)', inputs.version) || format('Release {0} · 2/2 (build + ship)', github.ref_name) }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New semver (e.g. 0.2.0 or 0.2.0-rc1)'
        required: true
        type: string

  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # ── Path 1: manual trigger ───────────────────────────────────────────
  # Bumps the workspace version, commits to main as the bot, tags vX.Y.Z,
  # and pushes both. Runs ONLY on workflow_dispatch.
  bump-and-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.-]+)?$'; then
            echo "Error: version must be semver format (e.g. 0.2.0 or 0.2.0-rc1)"
            echo "Got: ${{ inputs.version }}"
            exit 1
          fi

      # Mint an installation token from the sosein-release-bot GitHub App.
      # This bot is in the main-protection ruleset's bypass list, so it can
      # push the bump commit directly even though humans must use PRs.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: soseinai
          repositories: ought

      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag does not already exist
        run: |
          if git ls-remote --tags origin "v${{ inputs.version }}" | grep -q .; then
            echo "Error: tag v${{ inputs.version }} already exists on origin"
            exit 1
          fi

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Bump workspace version
        run: cargo set-version --workspace ${{ inputs.version }}

      - name: Show diff
        run: git diff --stat && git diff

      - name: Commit, tag, and push
        run: |
          git config user.name "sosein-release-bot[bot]"
          git config user.email "3199403+sosein-release-bot[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "Release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main
          git push origin "v${{ inputs.version }}"

      - name: Summary
        run: |
          echo "## Release v${{ inputs.version }} prepared :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version bumped to \`${{ inputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag \`v${{ inputs.version }}\` pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- The tag push has now triggered a separate run of this same workflow" >> "$GITHUB_STEP_SUMMARY"
          echo "  which will build, publish, and bump the Homebrew formula." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Watch the next run: https://github.com/${{ github.repository }}/actions/workflows/release.yml" >> "$GITHUB_STEP_SUMMARY"

  # ── Path 2: tag push ─────────────────────────────────────────────────
  # All four jobs below run ONLY when a tag matching v* is pushed (either by
  # bump-and-tag above, or by `git tag && git push` from the command line).
  build:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crates/ought-server/ui/package-lock.json

      - uses: extractions/setup-just@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build UI
        run: just build-ui

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p ought

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ought-${{ matrix.target }}.tar.gz ought
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: ought-${{ matrix.target }}
          path: ought-${{ matrix.target }}.tar.gz

  build-wheels:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crates/ought-server/ui/package-lock.json

      - uses: extractions/setup-just@v2

      # The wheel embeds the Svelte UI via rust-embed, so build it on the host
      # first — the maturin-action mounts the workspace into the manylinux
      # container, so dist/ will be present when cargo compiles ought-server.
      - name: Build UI
        run: just build-ui

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: ${{ startsWith(matrix.target, 'aarch64-unknown-linux') && '2_28' || (contains(matrix.target, 'linux') && 'auto' || '') }}
          sccache: 'true'

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ought-*.tar.gz

  publish-crates:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crates/ought-server/ui/package-lock.json

      - uses: extractions/setup-just@v2

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: just publish-crates

  publish-pypi:
    needs: [build-wheels, release]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --non-interactive --skip-existing dist/*.whl

  bump-homebrew:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      # Mint an installation token from the sosein-release-bot GitHub App,
      # scoped to the soseinai/homebrew-tap repo (where the formula lives).
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: soseinai
          repositories: homebrew-tap

      # Check out the tap repo (NOT this repo) so the bump commit goes there.
      - uses: actions/checkout@v4
        with:
          repository: soseinai/homebrew-tap
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Download prebuilt binaries and compute SHAs
        id: shas
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"

          # Download each prebuilt binary tarball with retries (release assets
          # can take a moment to become downloadable after the release job
          # finishes), then compute its sha256.
          download_sha() {
            local target=$1
            local url="${BASE}/ought-${target}.tar.gz"
            for i in 1 2 3 4 5; do
              if curl -fsSL -o "/tmp/${target}.tar.gz" "$url"; then
                sha256sum "/tmp/${target}.tar.gz" | awk '{print $1}'
                return 0
              fi
              echo "asset not yet available, retrying..." >&2
              sleep 5
            done
            echo "ERROR: failed to download ${url}" >&2
            return 1
          }

          SHA_ARM_MACOS=$(download_sha aarch64-apple-darwin)
          SHA_INTEL_MACOS=$(download_sha x86_64-apple-darwin)
          SHA_ARM_LINUX=$(download_sha aarch64-unknown-linux-gnu)
          SHA_INTEL_LINUX=$(download_sha x86_64-unknown-linux-gnu)

          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "base=${BASE}"
            echo "sha_arm_macos=${SHA_ARM_MACOS}"
            echo "sha_intel_macos=${SHA_INTEL_MACOS}"
            echo "sha_arm_linux=${SHA_ARM_LINUX}"
            echo "sha_intel_linux=${SHA_INTEL_LINUX}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate Homebrew formula
        run: |
          # The formula is generated fresh from a template each release rather
          # than sed-patching individual lines. This makes the format-of-record
          # for the formula live in this workflow file (search for `class Ought`
          # below to find/edit the template).
          cat > Formula/ought.rb <<EOF
          class Ought < Formula
            desc "Behavioral test framework powered by LLMs"
            homepage "https://sosein.ai/products/ought"
            version "${{ steps.shas.outputs.version }}"
            license any_of: ["MIT", "Apache-2.0"]

            on_macos do
              on_arm do
                url "${{ steps.shas.outputs.base }}/ought-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.shas.outputs.sha_arm_macos }}"
              end
              on_intel do
                url "${{ steps.shas.outputs.base }}/ought-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.shas.outputs.sha_intel_macos }}"
              end
            end

            on_linux do
              on_arm do
                url "${{ steps.shas.outputs.base }}/ought-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.shas.outputs.sha_arm_linux }}"
              end
              on_intel do
                url "${{ steps.shas.outputs.base }}/ought-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${{ steps.shas.outputs.sha_intel_linux }}"
              end
            end

            def install
              bin.install "ought"
            end

            test do
              assert_match "ought", shell_output("#{bin}/ought --version")
            end
          end
          EOF

      - name: Commit and push
        run: |
          git config user.name "sosein-release-bot[bot]"
          git config user.email "3199403+sosein-release-bot[bot]@users.noreply.github.com"
          git add Formula/ought.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date for ${{ steps.shas.outputs.tag }}"
            exit 0
          fi
          git commit -m "Bump Homebrew formula to ${{ steps.shas.outputs.tag }} [skip ci]"
          git push origin main
