name: Release

# This workflow has two trigger paths that together form one logical "release"
# operation:
#
#   1. workflow_dispatch (manual)  → bump-and-tag runs only
#      You click Actions → Release → Run workflow → enter version → Run.
#      bump-and-tag bumps Cargo.toml, commits as the bot, tags vX.Y.Z, and
#      pushes both. Pushing the tag then triggers path 2 below.
#
#   2. push tags ["v*"]  → build, github-release, publish-crates, bump-homebrew
#      Either fired by bump-and-tag's tag push, or by `git tag && git push`
#      from a laptop. Builds binaries, creates a GitHub release, publishes to
#      crates.io, and bumps the Homebrew formula.
#
# Each release results in TWO workflow runs in the Actions tab — one
# (workflow_dispatch) for the bump+tag, and one (push) for everything else.
# This is normal.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New semver (e.g. 0.2.0 or 0.2.0-rc1)'
        required: true
        type: string

  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # ── Path 1: manual trigger ───────────────────────────────────────────
  # Bumps the workspace version, commits to main as the bot, tags vX.Y.Z,
  # and pushes both. Runs ONLY on workflow_dispatch.
  bump-and-tag:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.-]+)?$'; then
            echo "Error: version must be semver format (e.g. 0.2.0 or 0.2.0-rc1)"
            echo "Got: ${{ inputs.version }}"
            exit 1
          fi

      # Mint an installation token from the sosein-release-bot GitHub App.
      # This bot is in the main-protection ruleset's bypass list, so it can
      # push the bump commit directly even though humans must use PRs.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: soseinai
          repositories: ought

      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag does not already exist
        run: |
          if git ls-remote --tags origin "v${{ inputs.version }}" | grep -q .; then
            echo "Error: tag v${{ inputs.version }} already exists on origin"
            exit 1
          fi

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Bump workspace version
        run: cargo set-version --workspace ${{ inputs.version }}

      - name: Show diff
        run: git diff --stat && git diff

      - name: Commit, tag, and push
        run: |
          git config user.name "sosein-release-bot[bot]"
          git config user.email "3199403+sosein-release-bot[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "Release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main
          git push origin "v${{ inputs.version }}"

      - name: Summary
        run: |
          echo "## Release v${{ inputs.version }} prepared :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version bumped to \`${{ inputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag \`v${{ inputs.version }}\` pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- The tag push has now triggered a separate run of this same workflow" >> "$GITHUB_STEP_SUMMARY"
          echo "  which will build, publish, and bump the Homebrew formula." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Watch the next run: https://github.com/${{ github.repository }}/actions/workflows/release.yml" >> "$GITHUB_STEP_SUMMARY"

  # ── Path 2: tag push ─────────────────────────────────────────────────
  # All four jobs below run ONLY when a tag matching v* is pushed (either by
  # bump-and-tag above, or by `git tag && git push` from the command line).
  build:
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crates/ought-server/ui/package-lock.json

      - uses: extractions/setup-just@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build UI
        run: just build-ui

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p ought

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ought-${{ matrix.target }}.tar.gz ought
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: ought-${{ matrix.target }}
          path: ought-${{ matrix.target }}.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ought-*.tar.gz

  publish-crates:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crates/ought-server/ui/package-lock.json

      - uses: extractions/setup-just@v2

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: just publish-crates

  bump-homebrew:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      # Mint an installation token from the sosein-release-bot GitHub App,
      # scoped to the soseinai/homebrew-tap repo (where the formula lives).
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: soseinai
          repositories: homebrew-tap

      # Check out the tap repo (NOT this repo) so the bump commit goes there.
      - uses: actions/checkout@v4
        with:
          repository: soseinai/homebrew-tap
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Compute tag info
        id: info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          # GitHub auto-generates a source tarball for every tag, but it can
          # take a few seconds to become available after the tag is pushed.
          for i in 1 2 3 4 5; do
            if curl -fsSL -o /tmp/source.tar.gz "$URL"; then
              break
            fi
            echo "tarball not yet available, retrying..."
            sleep 5
          done
          SHA=$(sha256sum /tmp/source.tar.gz | awk '{print $1}')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        run: |
          sed -i "s|^  url \".*\"|  url \"${{ steps.info.outputs.url }}\"|" Formula/ought.rb
          sed -i "s|^  sha256 \".*\"|  sha256 \"${{ steps.info.outputs.sha }}\"|" Formula/ought.rb

      - name: Commit and push
        run: |
          git config user.name "sosein-release-bot[bot]"
          git config user.email "3199403+sosein-release-bot[bot]@users.noreply.github.com"
          git add Formula/ought.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date for ${{ steps.info.outputs.tag }}"
            exit 0
          fi
          git commit -m "Bump Homebrew formula to ${{ steps.info.outputs.tag }} [skip ci]"
          git push origin main
