name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: crates/ought-server/ui/package-lock.json

      - uses: extractions/setup-just@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build UI
        run: just build-ui

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p ought

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../ought-${{ matrix.target }}.tar.gz ought
          cd ../../..

      - uses: actions/upload-artifact@v4
        with:
          name: ought-${{ matrix.target }}
          path: ought-${{ matrix.target }}.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ought-*.tar.gz

  publish-crates:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p ought-spec
          sleep 30
          cargo publish -p ought-gen
          sleep 30
          cargo publish -p ought-run
          sleep 30
          cargo publish -p ought-report
          sleep 30
          cargo publish -p ought-analysis
          sleep 30
          cargo publish -p ought-mcp
          sleep 30
          cargo publish -p ought

  bump-homebrew:
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      # Mint an installation token from the sosein-release-bot GitHub App.
      # This bot is in the main-protection ruleset's bypass list, so it can
      # push directly to main even though humans must use PRs.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: soseinai
          repositories: ought

      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}

      - name: Compute tag info
        id: info
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          URL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          # GitHub auto-generates a source tarball for every tag, but it can
          # take a few seconds to become available after the tag is pushed.
          for i in 1 2 3 4 5; do
            if curl -fsSL -o /tmp/source.tar.gz "$URL"; then
              break
            fi
            echo "tarball not yet available, retrying..."
            sleep 5
          done
          SHA=$(sha256sum /tmp/source.tar.gz | awk '{print $1}')
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew formula
        run: |
          sed -i "s|^  url \".*\"|  url \"${{ steps.info.outputs.url }}\"|" Formula/ought.rb
          sed -i "s|^  sha256 \".*\"|  sha256 \"${{ steps.info.outputs.sha }}\"|" Formula/ought.rb

      - name: Commit and push
        run: |
          git config user.name "sosein-release-bot[bot]"
          git config user.email "3199403+sosein-release-bot[bot]@users.noreply.github.com"
          git add Formula/ought.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date for ${{ steps.info.outputs.tag }}"
            exit 0
          fi
          git commit -m "Bump Homebrew formula to ${{ steps.info.outputs.tag }} [skip ci]"
          git push origin main
