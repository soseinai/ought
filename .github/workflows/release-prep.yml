name: Release Prep

# Manually-triggered workflow that prepares a new release:
#   1. Bumps the workspace version in Cargo.toml + Cargo.lock
#   2. Commits the bump to main as the release bot
#   3. Creates the matching `vX.Y.Z` tag
#   4. Pushes both the commit and the tag
#
# The tag push then triggers .github/workflows/release.yml which builds
# binaries, creates a GitHub release, publishes to crates.io, and bumps
# the Homebrew formula.
#
# Usage: Actions → Release Prep → Run workflow → enter version (e.g. 0.2.0)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New semver (e.g. 0.2.0 or 0.2.0-rc1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  bump-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9.-]+)?$'; then
            echo "Error: version must be semver format (e.g. 0.2.0 or 0.2.0-rc1)"
            echo "Got: ${{ inputs.version }}"
            exit 1
          fi

      # Mint an installation token from the sosein-release-bot GitHub App.
      # This bot is in the main-protection ruleset's bypass list, so it can
      # push the bump commit and tag directly even though humans must use PRs.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: soseinai
          repositories: ought

      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag does not already exist
        run: |
          if git ls-remote --tags origin "v${{ inputs.version }}" | grep -q .; then
            echo "Error: tag v${{ inputs.version }} already exists on origin"
            exit 1
          fi

      - name: Install cargo-edit
        run: cargo install cargo-edit --locked

      - name: Bump workspace version
        run: cargo set-version --workspace ${{ inputs.version }}

      - name: Show diff
        run: git diff --stat && git diff

      - name: Commit, tag, and push
        run: |
          git config user.name "sosein-release-bot[bot]"
          git config user.email "3199403+sosein-release-bot[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "Release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push origin main
          git push origin "v${{ inputs.version }}"

      - name: Summary
        run: |
          echo "## Release v${{ inputs.version }} prepared :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version bumped to \`${{ inputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Tag \`v${{ inputs.version }}\` pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- The release.yml workflow will now build, publish, and bump the Homebrew formula" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Watch the release: https://github.com/${{ github.repository }}/actions/workflows/release.yml" >> "$GITHUB_STEP_SUMMARY"
